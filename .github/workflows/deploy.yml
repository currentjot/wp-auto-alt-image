name: Release

# ──────────────────────────────────────────────────────────────────────────────
# Trigger: si attiva quando viene pubblicata una Release su GitHub.
# Il tag DEVE corrispondere alla versione nel plugin header e nel README.md
# (es. tag "v1.0.0" → Version: 1.0.0 nel .php → badge version-1.0.0 nel README)
# ──────────────────────────────────────────────────────────────────────────────
on:
  release:
    types: [published]

jobs:
  release:
    name: Verify & Package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write  # necessario per allegare asset alla Release

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Estrai la versione dal tag ────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "→ Tag: $TAG | Version: $VERSION"

      # ── 3. Verifica coerenza versione ────────────────────────────────────────
      - name: Verify version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          PLUGIN_VER=$(grep -m1 'Version:' wp-auto-alt-image.php \
            | sed 's/.*Version:\s*//' | tr -d '[:space:]')

          README_VER=$(grep -m1 'version-' README.md \
            | sed 's/.*version-\([0-9.]*\)-.*/\1/')

          echo "Tag version   : $VERSION"
          echo "Plugin header : $PLUGIN_VER"
          echo "README.md     : $README_VER"

          if [ "$VERSION" != "$PLUGIN_VER" ]; then
            echo "❌ Plugin header ($PLUGIN_VER) ≠ tag ($VERSION)."
            exit 1
          fi

          if [ "$VERSION" != "$README_VER" ]; then
            echo "❌ README.md badge ($README_VER) ≠ tag ($VERSION)."
            exit 1
          fi

          echo "✅ Versioni coerenti."

      # ── 4. Crea lo zip del plugin ────────────────────────────────────────────
      - name: Build zip
        id: zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="wp-auto-alt-image-${VERSION}.zip"

          mkdir -p /tmp/wp-auto-alt-image

          cp wp-auto-alt-image.php /tmp/wp-auto-alt-image/
          cp README.md             /tmp/wp-auto-alt-image/
          cp CHANGELOG.md          /tmp/wp-auto-alt-image/

          cd /tmp
          zip -r "$ZIP_NAME" wp-auto-alt-image/

          echo "zip_path=/tmp/$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME"      >> "$GITHUB_OUTPUT"
          echo "→ Zip creato: $ZIP_NAME"

      # ── 5. Allega lo zip alla Release ────────────────────────────────────────
      - name: Upload zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zip_path }}
